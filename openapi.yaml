# OpenAPI Documentation

## Main Section

### Methods

#### Modulus Method

**Description:**
The `modulus` method allows users to calculate the remainder of the division of two numbers. This method is particularly useful in mathematical computations where the modulus is required.

**HTTP Method:** `GET`

**Endpoint:** `/modulus`

**Request Parameters:**
- `dividend`: The number to be divided. This is a required parameter.
- `divisor`: The number by which the dividend will be divided. This is a required parameter.

**Responses:**

- **200 OK**
  - **Description:** The request was successful, and the response contains the result of the modulus operation.
  - **Content:**
    ```json
    {
      "result": 0
    }
    ```

- **400 Bad Request**
  - **Description:** The request could not be processed due to incorrect input parameters. Ensure both `dividend` and `divisor` are provided and that `divisor` is not zero.
  - **Content:**
    ```json
    {
      "error": "Invalid input parameters. Ensure both 'dividend' and 'divisor' are integers and 'divisor' is not zero."
    }
    ```

- **500 Internal Server Error**
  - **Description:** The server encountered an unexpected condition which prevented it from fulfilling the request.
  - **Content:**
    ```json
    {
      "error": "Internal server error. Please try again later."
    }
    ```

#### Floor Divide Method

**Description:**
The `floor_divide` method performs floor division between two numbers, returning the largest integer less than or equal to the division result. This method is useful for operations that require discarding the fractional part of division results.

**HTTP Method:** `GET`

**Endpoint:** `/floor_divide`

**Request Parameters:**
- `dividend`: The number to be divided. This is a required parameter.
- `divisor`: The number by which the dividend will be divided. This is a required parameter.

**Responses:**

- **200 OK**
  - **Description:** The request was successful, and the response contains the result of the floor division operation.
  - **Content:**
    ```json
    {
      "result": 0
    }
    ```

- **400 Bad Request**
  - **Description:** The request could not be processed due to incorrect input parameters. Ensure both `dividend` and `divisor` are provided and that `divisor` is not zero.
  - **Content:**
    ```json
    {
      "error": "Invalid input parameters. Ensure both 'dividend' and 'divisor' are integers and 'divisor' is not zero."
    }
    ```

- **500 Internal Server Error**
  - **Description:** The server encountered an unexpected condition which prevented it from fulfilling the request.
  - **Content:**
    ```json
    {
      "error": "Internal server error. Please try again later."
    }
    ```

#### Square Root Method

**Description:**
The `sqrt` method calculates the square root of a given number. This method is essential for various mathematical calculations that require the square root function.

**HTTP Method:** `GET`

**Endpoint:** `/sqrt`

**Request Parameters:**
- `number`: The number for which the square root is to be calculated. This is a required parameter.

**Responses:**

- **200 OK**
  - **Description:** The request was successful, and the response contains the square root of the provided number.
  - **Content:**
    ```json
    {
      "result": 0
    }
    ```

- **400 Bad Request**
  - **Description:** The request could not be processed due to incorrect input parameters. Ensure that `number` is provided and is a non-negative integer.
  - **Content:**
    ```json
    {
      "error": "Invalid input parameters. Ensure 'number' is a non-negative integer."
    }
    ```

- **500 Internal Server Error**
  - **Description:** The server encountered an unexpected condition which prevented it from fulfilling the request.
  - **Content:**
    ```json
    {
      "error": "Internal server error. Please try again later."
    }
    ```

#### Full Power Method

**Description:**
The `full_power` method raises a number to the power of another number. This method is crucial for performing exponential calculations.

**HTTP Method:** `GET`

**Endpoint:** `/full_power`

**Request Parameters:**
- `base`: The base number. This is a required parameter.
- `exponent`: The exponent to which the base number is raised. This is a required parameter.

**Responses:**

- **200 OK**
  - **Description:** The request was successful, and the response contains the result of the power operation.
  - **Content:**
    ```json
    {
      "result": 0
    }
    ```

- **400 Bad Request**
  - **Description:** The request could not be processed due to incorrect input parameters. Ensure both `base` and `exponent` are provided.
  - **Content:**
    ```json
    {
      "error": "Invalid input parameters. Ensure both 'base' and 'exponent' are integers."
    }
    ```

- **500 Internal Server Error**
  - **Description:** The server encountered an unexpected condition which prevented it from fulfilling the request.
  - **Content:**
    ```json
    {
      "error": "Internal server error. Please try again later."
    }
    ```

#### Single Modulus Method

**Description:**
The `single_modulus` method calculates the modulus of a number by a predefined divisor. This method simplifies operations where a constant divisor is used.

**HTTP Method:** `GET`

**Endpoint:** `/single_modulus`

**Request Parameters:**
- `number`: The number to be divided. This is a required parameter.

**Responses:**

- **200 OK**
  - **Description:** The request was successful, and the response contains the modulus of the provided number.
  - **Content:**
    ```json
    {
      "result": 0
    }
    ```

- **400 Bad Request**
  - **Description:** The request could not be processed due to incorrect input parameters. Ensure that `number` is provided.
  - **Content:**
    ```json
    {
      "error": "Invalid input parameters. Ensure 'number' is an integer."
    }
    ```

- **500 Internal Server Error**
  - **Description:** The server encountered an unexpected condition which prevented it from fulfilling the request.
  - **Content:**
    ```json
    {
      "error": "Internal server error. Please try again later."
    }
    ```

### Parameters Section

**Modulus Parameters:**

- `dividend` (integer, required): The number that is to be divided.
- `divisor` (integer, required): The number by which the dividend is to be divided. It must be non-zero to avoid a division by zero error.

**Floor Divide Parameters:**

- `dividend` (integer, required): The number that is to be divided.
- `divisor` (integer, required): The number by which the dividend is to be divided. It must be non-zero to avoid a division by zero error.

**Square Root Parameters:**

- `number` (integer, required): The number for which the square root is to be calculated. It must be non-negative.

**Full Power Parameters:**

- `base` (integer, required): The base number for the power operation.
- `exponent` (integer, required): The exponent to which the base is raised.

**Single Modulus Parameters:**

- `number` (integer, required): The number for which the modulus is calculated.

### Responses Section

**Modulus Responses:**

- **Success Response:**
  - **Code:** 200
  - **Content:** `{ "result": <calculated_remainder> }`
  - **Description:** Returns the remainder of the division of the provided `dividend` by the `divisor`.

- **Error Responses:**
  - **400 Bad Request:** Occurs when the input parameters are missing or invalid (e.g., divisor is zero).
  - **500 Internal Server Error:** Occurs when there is an unexpected server-side error.

**Floor Divide Responses:**

- **Success Response:**
  - **Code:** 200
  - **Content:** `{ "result": <calculated_floor_division> }`
  - **Description:** Returns the largest integer less than or equal to the division of the provided `dividend` by the `divisor`.

**Square Root Responses:**

- **Success Response:**
  - **Code:** 200
  - **Content:** `{ "result": <calculated_square_root> }`
  - **Description:** Returns the square root of the provided number.

**Full Power Responses:**

- **Success Response:**
  - **Code:** 200
  - **Content:** `{ "result": <calculated_power> }`
  - **Description:** Returns the result of raising the base to the power of the exponent.

**Single Modulus Responses:**

- **Success Response:**
  - **Code:** 200
  - **Content:** `{ "result": <calculated_modulus> }`
  - **Description:** Returns the modulus of the provided number.

